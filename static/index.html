<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude Code – Web Chat</title>
<style>
  /* ── Reset & base ───────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0d1117;
    --bg-panel:    #161b22;
    --bg-input:    #0d1117;
    --border:      #30363d;
    --text:        #e6edf3;
    --text-dim:    #8b949e;
    --text-system: #58a6ff;
    --text-user:   #79c0ff;
    --text-claude: #e6edf3;
    --text-stderr: #f85149;
    --text-stdout: #d2a8ff;
    --accent:      #238636;
    --accent-h:    #2ea043;
    --red:         #da3633;
    --green:       #3fb950;
    --yellow:      #d29922;
    --radius:      6px;
    --font:        "Cascadia Code", "Fira Code", "JetBrains Mono",
                   "Consolas", "Menlo", "Monaco", monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Layout ─────────────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ── Top bar ─────────────────────────────────────────────────── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #topbar h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  #status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    transition: background 0.3s;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.4);
  }
  #status-dot.running { background: var(--green); }
  #status-dot.thinking {
    background: var(--yellow);
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }

  #status-label {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* spacer */
  #topbar .spacer { flex: 1; }

  /* workdir control */
  #workdir-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }
  #workdir-wrap label { white-space: nowrap; }

  #workdir-input {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 3px 8px;
    width: 280px;
    outline: none;
    transition: border-color 0.2s;
  }
  #workdir-input:focus { border-color: #58a6ff; }

  /* stop button */
  #btn-stop {
    padding: 4px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--red);
    background: transparent;
    color: var(--red);
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  #btn-stop:hover:not(:disabled) { background: var(--red); color: #fff; }
  #btn-stop:disabled { opacity: 0.35; cursor: default; }

  /* ── Messages area ───────────────────────────────────────────── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
  }

  /* thin scrollbar */
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .msg-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 8px 10px;
    border-radius: var(--radius);
    max-width: 100%;
    word-break: break-word;
    white-space: pre-wrap;
  }

  /* user message – right-aligned bubble */
  .msg-block.user {
    align-self: flex-end;
    background: #1c2a3a;
    border: 1px solid #2d4a6a;
    color: var(--text-user);
    max-width: 75%;
  }
  .msg-block.user .msg-label { color: #79c0ff; }

  /* claude (assistant) message */
  .msg-block.assistant {
    align-self: flex-start;
    background: #161b22;
    border: 1px solid var(--border);
    color: var(--text-claude);
    max-width: 90%;
  }
  .msg-block.assistant .msg-label { color: #58a6ff; }

  /* system / meta messages */
  .msg-block.system {
    align-self: flex-start;
    color: var(--text-system);
    font-size: 12px;
    padding: 2px 10px;
    opacity: 0.75;
  }
  .msg-block.system .msg-label { display: none; }

  /* stderr */
  .msg-block.stderr {
    align-self: flex-start;
    color: var(--text-stderr);
    font-size: 12px;
    padding: 2px 10px;
    opacity: 0.8;
  }
  .msg-block.stderr .msg-label { color: var(--text-stderr); }

  /* stdout / raw */
  .msg-block.stdout {
    align-self: flex-start;
    color: var(--text-stdout);
    font-size: 12px;
  }

  /* error */
  .msg-block.error {
    align-self: flex-start;
    background: #2a1215;
    border: 1px solid var(--red);
    color: var(--text-stderr);
    font-size: 13px;
  }
  .msg-block.error .msg-label { color: var(--red); }

  .msg-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    opacity: 0.8;
    margin-bottom: 2px;
  }

  .msg-text { line-height: 1.65; }

  /* typing cursor blink on active assistant block */
  .msg-block.assistant.streaming .msg-text::after {
    content: "▍";
    animation: blink 0.7s step-end infinite;
    color: #58a6ff;
    margin-left: 1px;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* ── Divider between exchanges ───────────────────────────────── */
  .exchange-divider {
    border: none;
    border-top: 1px dashed #21262d;
    margin: 8px 0;
  }

  /* ── Welcome screen ──────────────────────────────────────────── */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    color: var(--text-dim);
    pointer-events: none;
    user-select: none;
  }
  #welcome .logo { font-size: 28px; margin-bottom: 4px; }
  #welcome h2 { font-size: 18px; color: var(--text); font-weight: 600; }
  #welcome p  { font-size: 13px; text-align: center; max-width: 380px; }
  #welcome code {
    background: #21262d;
    padding: 1px 6px;
    border-radius: 4px;
    color: #d2a8ff;
    font-size: 12px;
  }

  /* ── Input area ──────────────────────────────────────────────── */
  #input-area {
    padding: 12px 16px;
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #prompt-input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 8px 12px;
    resize: none;
    min-height: 42px;
    max-height: 200px;
    outline: none;
    line-height: 1.5;
    transition: border-color 0.2s;
    overflow-y: auto;
  }
  #prompt-input:focus { border-color: #58a6ff; }
  #prompt-input:disabled { opacity: 0.5; cursor: not-allowed; }
  #prompt-input::placeholder { color: var(--text-dim); }

  #btn-send {
    padding: 8px 18px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    align-self: flex-end;
    height: 42px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #btn-send:hover:not(:disabled) { background: var(--accent-h); }
  #btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  #input-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 5px;
    padding: 0 2px;
  }
  #input-hint kbd {
    background: #21262d;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0 4px;
    font-family: var(--font);
    font-size: 10px;
  }

  /* ── Connection lost banner ──────────────────────────────────── */
  #conn-banner {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #5a1e1a;
    color: #ff7b72;
    text-align: center;
    padding: 6px;
    font-size: 13px;
    z-index: 100;
    border-bottom: 1px solid var(--red);
  }
  #conn-banner.visible { display: block; }
</style>
</head>
<body>

<div id="conn-banner">
  WebSocket disconnected — <a href="" style="color:inherit" onclick="location.reload();return false;">reconnect</a>
</div>

<div id="app">

  <!-- ── Top bar ──────────────────────────────────────────── -->
  <div id="topbar">
    <div id="status-dot" title="idle"></div>
    <h1>Claude Code</h1>
    <span id="status-label">idle</span>
    <div class="spacer"></div>
    <div id="workdir-wrap">
      <label for="workdir-input">dir:</label>
      <input id="workdir-input" type="text" spellcheck="false"
             placeholder="/home/user/project"
             title="Working directory for claude" />
    </div>
    <button id="btn-stop" disabled title="Stop running session (/stop)">■ Stop</button>
  </div>

  <!-- ── Messages ─────────────────────────────────────────── -->
  <div id="messages">
    <div id="welcome">
      <div class="logo">⬡</div>
      <h2>Claude Code Web Chat</h2>
      <p>Type a prompt below. Use <code>/stop</code> to abort a running session.</p>
      <p>Set the working directory in the top bar before sending the first message.</p>
    </div>
  </div>

  <!-- ── Input ────────────────────────────────────────────── -->
  <div id="input-area">
    <div id="input-row">
      <textarea id="prompt-input" rows="1"
                placeholder="Ask Claude Code anything… (Enter to send, Shift+Enter for new line)"
                spellcheck="false"></textarea>
      <button id="btn-send">Send</button>
    </div>
    <div id="input-hint">
      <kbd>Enter</kbd> send &nbsp;·&nbsp;
      <kbd>Shift+Enter</kbd> new line &nbsp;·&nbsp;
      type <kbd>/stop</kbd> to abort
    </div>
  </div>

</div><!-- #app -->

<script>
(function () {
  "use strict";

  // ── DOM refs ───────────────────────────────────────────────────
  const messagesEl   = document.getElementById("messages");
  const welcomeEl    = document.getElementById("welcome");
  const promptInput  = document.getElementById("prompt-input");
  const btnSend      = document.getElementById("btn-send");
  const btnStop      = document.getElementById("btn-stop");
  const workdirInput = document.getElementById("workdir-input");
  const statusDot    = document.getElementById("status-dot");
  const statusLabel  = document.getElementById("status-label");
  const connBanner   = document.getElementById("conn-banner");

  // ── State ──────────────────────────────────────────────────────
  let ws              = null;
  let isRunning       = false;
  let currentBlock    = null;   // active streaming assistant block
  let reconnectTimer  = null;
  let reconnectDelay  = 1000;

  // ── WebSocket ──────────────────────────────────────────────────
  function connect() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const url   = `${proto}//${location.host}/ws`;

    ws = new WebSocket(url);

    ws.addEventListener("open", () => {
      connBanner.classList.remove("visible");
      reconnectDelay = 1000;
      addSystem("Connected to server.");
    });

    ws.addEventListener("close", () => {
      connBanner.classList.add("visible");
      setStatus("idle");
      currentBlock = null;
      scheduleReconnect();
    });

    ws.addEventListener("error", () => {
      // handled via close event
    });

    ws.addEventListener("message", (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      handleMessage(msg);
    });
  }

  function scheduleReconnect() {
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(() => {
      addSystem(`Reconnecting…`);
      connect();
    }, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 16000);
  }

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
      return true;
    }
    return false;
  }

  // ── Incoming messages ──────────────────────────────────────────
  function handleMessage(msg) {
    const { type, data } = msg;

    switch (type) {
      case "status":
        if (data === "running") {
          setStatus("running");
        } else if (data === "stopped") {
          setStatus("idle");
          if (currentBlock) {
            currentBlock.classList.remove("streaming");
            currentBlock = null;
          }
        }
        break;

      case "assistant":
        appendAssistantChunk(data);
        break;

      case "stdout":
        appendRaw("stdout", data);
        break;

      case "stderr":
        appendRaw("stderr", `[stderr] ${data}`);
        break;

      case "system":
        addSystem(data);
        break;

      case "error":
        addError(data);
        if (currentBlock) {
          currentBlock.classList.remove("streaming");
          currentBlock = null;
        }
        break;

      case "pong":
        // heartbeat reply – ignore
        break;

      default:
        console.debug("Unknown msg type:", type, data);
    }
  }

  // ── Status indicator ───────────────────────────────────────────
  function setStatus(state) {
    isRunning = (state === "running");

    statusDot.className   = "";
    statusDot.title       = state;
    statusLabel.textContent = state;

    if (state === "running") {
      statusDot.classList.add("running");
      btnStop.disabled    = false;
      btnSend.disabled    = true;
      promptInput.disabled = true;
    } else {
      btnStop.disabled    = true;
      btnSend.disabled    = false;
      promptInput.disabled = false;
      promptInput.focus();
    }
  }

  // ── Message rendering ──────────────────────────────────────────
  function removeWelcome() {
    if (welcomeEl && welcomeEl.parentNode) {
      welcomeEl.remove();
    }
  }

  function addBlock(cls, label, text) {
    removeWelcome();
    const block = document.createElement("div");
    block.className = `msg-block ${cls}`;

    if (label) {
      const lbl = document.createElement("div");
      lbl.className = "msg-label";
      lbl.textContent = label;
      block.appendChild(lbl);
    }

    const body = document.createElement("div");
    body.className = "msg-text";
    body.textContent = text;
    block.appendChild(body);

    messagesEl.appendChild(block);
    scrollBottom();
    return block;
  }

  function addDivider() {
    const hr = document.createElement("hr");
    hr.className = "exchange-divider";
    messagesEl.appendChild(hr);
  }

  function addUser(text) {
    addBlock("user", "You", text);
  }

  function addSystem(text) {
    addBlock("system", null, `▸ ${text}`);
  }

  function addError(text) {
    addBlock("error", "Error", text);
  }

  function appendRaw(cls, text) {
    // Merge consecutive same-class raw lines into one block when possible
    const last = messagesEl.lastElementChild;
    if (last && last.classList.contains(cls) && !last.classList.contains("streaming")) {
      const body = last.querySelector(".msg-text");
      if (body) {
        body.textContent += "\n" + text;
        scrollBottom();
        return;
      }
    }
    addBlock(cls, cls, text);
  }

  function appendAssistantChunk(text) {
    if (!currentBlock) {
      // New assistant response starts
      currentBlock = addBlock("assistant streaming", "Claude", "");
    }
    const body = currentBlock.querySelector(".msg-text");
    if (body) {
      body.textContent += text;
    }
    scrollBottom();
  }

  // ── Scroll ─────────────────────────────────────────────────────
  function scrollBottom() {
    // Only auto-scroll if user is near the bottom (within 120px)
    const el = messagesEl;
    const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 120;
    if (nearBottom) {
      el.scrollTop = el.scrollHeight;
    }
  }

  // ── Auto-resize textarea ───────────────────────────────────────
  function resizeTextarea() {
    promptInput.style.height = "auto";
    const h = Math.min(promptInput.scrollHeight, 200);
    promptInput.style.height = h + "px";
  }

  promptInput.addEventListener("input", resizeTextarea);

  // ── Send logic ─────────────────────────────────────────────────
  function sendPrompt() {
    const text = promptInput.value.trim();
    if (!text) return;

    // Special command: /stop
    if (text === "/stop") {
      promptInput.value = "";
      resizeTextarea();
      send({ type: "stop" });
      return;
    }

    if (isRunning) {
      addError("Claude is still running. Use /stop to abort.");
      return;
    }

    if (!ws || ws.readyState !== WebSocket.OPEN) {
      addError("Not connected to server.");
      return;
    }

    const workdir = workdirInput.value.trim() || "/home/claude";

    // Show divider between exchanges (not before the very first)
    if (messagesEl.children.length > 0) {
      addDivider();
    }
    addUser(text);

    send({
      type:    "run",
      prompt:  text,
      workdir: workdir,
    });

    promptInput.value = "";
    resizeTextarea();
  }

  // Enter = send, Shift+Enter = newline
  promptInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendPrompt();
    }
  });

  btnSend.addEventListener("click", sendPrompt);

  btnStop.addEventListener("click", () => {
    send({ type: "stop" });
  });

  // ── Heartbeat (keep connection alive through proxies) ──────────
  setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      send({ type: "ping" });
    }
  }, 25000);

  // ── Fetch initial workdir from server (optional heuristic) ─────
  // Default to /home/claude; user can override in the input field.
  workdirInput.placeholder = "/home/claude";
  workdirInput.value       = "/home/claude";

  // ── Init ────────────────────────────────────────────────────────
  connect();
  promptInput.focus();

})();
</script>
</body>
</html>
